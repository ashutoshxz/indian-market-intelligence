version: "3.9"

# ================================
# Indian Market Intelligence Platform
# docker-compose.yml
# ================================

services:

  # ---- Frontend (React + Vite) ----
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: imip_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
      - VITE_WS_URL=ws://localhost:5000
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - imip_network
    restart: unless-stopped

  # ---- Backend (Node.js + Express) ----
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: imip_backend
    ports:
      - "5000:5000"
    env_file:
      - ../infrastructure/env/example.env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/market_intelligence
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:8000
      - INGESTION_SERVICE_URL=http://ingestion-service:8001
    volumes:
      - ../backend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
      - ai-service
    networks:
      - imip_network
    restart: unless-stopped

  # ---- AI Service (Python + FastAPI) ----
  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: imip_ai_service
    ports:
      - "8000:8000"
    env_file:
      - ../infrastructure/env/example.env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ../ai-service:/app
    depends_on:
      - redis
    networks:
      - imip_network
    restart: unless-stopped

  # ---- Ingestion Service (Python + Scheduler) ----
  ingestion-service:
    build:
      context: ../ingestion-service
      dockerfile: Dockerfile
    container_name: imip_ingestion
    ports:
      - "8001:8001"
    env_file:
      - ../infrastructure/env/example.env
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/market_intelligence
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:8000
    volumes:
      - ../ingestion-service:/app
    depends_on:
      - postgres
      - redis
      - ai-service
    networks:
      - imip_network
    restart: unless-stopped

  # ---- PostgreSQL ----
  postgres:
    image: postgres:15-alpine
    container_name: imip_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: market_intelligence
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - imip_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis (Cache + Pub/Sub for live data) ----
  redis:
    image: redis:7-alpine
    container_name: imip_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - imip_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Nginx (Reverse Proxy) ----
  nginx:
    image: nginx:alpine
    container_name: imip_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - imip_network
    restart: unless-stopped

# ================================
# Volumes
# ================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ================================
# Networks
# ================================
networks:
  imip_network:
    driver: bridge
